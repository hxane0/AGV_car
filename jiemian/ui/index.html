<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能物料搬运系统</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --color-bg: #0B0F18;
            --color-primary: #4A90D9;
            --color-primary-hover: #5A9FE8;
            --color-text: #E0E6ED;
            --color-text-secondary: #7A8494;
            --color-ice-white: #E8EFF8;
            --glass-bg: rgba(255,255,255,0.04);
            --glass-bg-hover: rgba(255,255,255,0.07);
            --glass-border: rgba(255,255,255,0.08);
            --glass-border-focus: rgba(74,144,217,0.5);
            --glass-blur: blur(16px);
            --glass-shadow: 0 4px 24px rgba(0,0,0,0.3);
            --radius-lg: 12px;
            --radius-md: 8px;
            --radius-sm: 4px;
            --transition-fast: 150ms ease;
            --nav-height: 60px;
            --sidebar-width: 220px;
            --sidebar-collapsed: 64px;
            --color-success: #52c41a;
            --color-error: #f5222d;
            --color-warning: #faad14;
            --color-info: #4A90D9;
            --color-orange: #fa8c16;
            --color-cyan: #13c2c2;
            --color-gray: #8c8c8c;
            /* 侧栏导航选中态（紫色，与主色区分） */
            --color-nav-active: #A78BFA;
            --color-nav-active-bg: rgba(139, 92, 246, 0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--color-bg);
            background-image:
                linear-gradient(180deg, rgba(11, 15, 24, 0.22) 0%, rgba(11, 15, 24, 0.35) 100%),
                url('lain1.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--color-text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Top Navigation ── */
        .top-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-height);
            background: rgba(15, 20, 35, 0.75);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .top-nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-toggle {
            width: 36px; height: 36px;
            background: transparent;
            border: none;
            color: var(--color-text-secondary);
            cursor: pointer;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-fast), color var(--transition-fast);
        }
        .sidebar-toggle:hover {
            background: rgba(255,255,255,0.06);
            color: var(--color-text);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 32px; height: 32px;
            color: var(--color-nav-active);
        }
        .logo-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text);
            letter-spacing: 0.5px;
        }

        .sim-banner {
            background: rgba(250,140,22,0.12);
            color: var(--color-orange);
            font-size: 14px;
            padding: 4px 12px;
            border-radius: var(--radius-sm);
            margin-left: 16px;
        }

        .top-nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--color-text-secondary);
            padding: 6px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            transition: background var(--transition-fast), color var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.06);
            color: var(--color-text);
        }

        .ws-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .ws-dot.connected {
            background: var(--color-success);
            box-shadow: 0 0 4px var(--color-success);
        }
        .ws-dot.disconnected {
            background: var(--color-error);
            box-shadow: 0 0 4px var(--color-error);
        }

        .lang-switch {
            font-size: 14px;
            padding: 4px 10px;
        }

        .user-info {
            font-size: 14px;
            color: var(--color-text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ── Sidebar ── */
        .sidebar {
            position: fixed;
            top: var(--nav-height);
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: rgba(15, 20, 35, 0.6);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-right: 1px solid rgba(255,255,255,0.06);
            padding: 12px 0;
            z-index: 999;
            transition: width 200ms ease;
            overflow-x: hidden;
            overflow-y: auto;
        }
        .sidebar.collapsed {
            width: var(--sidebar-collapsed);
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        .menu-section-title {
            font-size: 14px;
            color: var(--color-text-secondary);
            padding: 16px 20px 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
        }
        .sidebar.collapsed .menu-section-title { opacity: 0; height: 0; padding: 0; }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            cursor: pointer;
            color: var(--color-text-secondary);
            text-decoration: none;
            border-radius: 0;
            position: relative;
            transition: background var(--transition-fast), color var(--transition-fast);
            white-space: nowrap;
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.04);
            color: var(--color-text);
        }
        .menu-item.active {
            color: var(--color-nav-active);
            background: var(--color-nav-active-bg);
        }
        .menu-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 4px;
            width: 2px;
            background: var(--color-nav-active);
            border-radius: 0 1px 1px 0;
        }

        .menu-icon {
            width: 20px; height: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-icon svg {
            width: 18px; height: 18px;
        }

        .menu-label {
            font-size: 15px;
            overflow: hidden;
            transition: opacity 200ms ease;
        }
        .sidebar.collapsed .menu-label { opacity: 0; width: 0; }
        .sidebar.collapsed .menu-item { justify-content: center; padding: 10px 0; }

        /* ── Main Content ── */
        .main-content {
            margin-top: var(--nav-height);
            margin-left: var(--sidebar-width);
            padding: 24px;
            min-height: calc(100vh - var(--nav-height));
            transition: margin-left 200ms ease;
        }
        .sidebar.collapsed ~ .main-content,
        .main-content.sidebar-collapsed {
            margin-left: var(--sidebar-collapsed);
        }

        /* 监控总览：次要文字加深对比（仅主页 .dashboard 作用域） */
        .dashboard {
            --color-text-secondary: #A8B2BE;
        }

        /* ── Glass Card ── */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--glass-shadow);
            transition: background var(--transition-fast);
        }
        .glass-card:hover {
            background: var(--glass-bg-hover);
        }

        /* ── KPI Cards ── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        @media (max-width: 1439px) {
            .kpi-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 1023px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .kpi-card {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .kpi-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .kpi-icon {
            width: 40px; height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .kpi-icon svg { width: 22px; height: 22px; }
        .kpi-change {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .kpi-change.up { color: #52c41a; }
        .kpi-change.down { color: #f5222d; }
        .kpi-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--color-text);
            line-height: 1.2;
        }
        .kpi-label {
            font-size: 15px;
            color: var(--color-text-secondary);
        }

        /* ── Charts Grid ── */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        @media (max-width: 1023px) {
            .charts-grid { grid-template-columns: 1fr; }
        }

        .chart-card {
            padding: 20px;
        }
        .chart-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--color-text);
            margin-bottom: 16px;
        }
        .chart-container {
            width: 100%;
            height: 260px;
        }

        /* ── Events List ── */
        .events-card {
            padding: 20px;
        }
        .events-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .events-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--color-text);
        }

        .event-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            transition: background var(--transition-fast);
            cursor: default;
        }
        .event-row:hover {
            background: rgba(255,255,255,0.03);
        }
        .event-row + .event-row {
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        .event-badge {
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            flex-shrink: 0;
        }
        .event-badge.error {
            background: rgba(245,34,45,0.12);
            color: #f5222d;
        }
        .event-badge.warning {
            background: rgba(250,173,20,0.12);
            color: #faad14;
        }
        .event-badge.info {
            background: rgba(74,144,217,0.12);
            color: #4A90D9;
        }

        .event-message {
            flex: 1;
            font-size: 15px;
            color: var(--color-text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .event-time {
            font-size: 14px;
            color: var(--color-text-secondary);
            flex-shrink: 0;
        }
        .event-agv {
            font-size: 14px;
            color: var(--color-primary);
            flex-shrink: 0;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }

        /* ── Page Title ── */
        .page-title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--color-text);
        }
        .page-subtitle {
            font-size: 15px;
            color: var(--color-text-secondary);
            margin-top: 2px;
        }

        /* ── Pulse animation for data update ── */
        @keyframes dataPulse {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .data-pulse {
            animation: dataPulse 180ms ease-out;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

        /* ── View More Link ── */
        .view-more {
            font-size: 15px;
            color: var(--color-primary);
            text-decoration: none;
            cursor: pointer;
            transition: color var(--transition-fast);
        }
        .view-more:hover {
            color: var(--color-primary-hover);
            text-decoration: underline;
        }

        /* ── Map View ── */
        .map-page {
            display: flex;
            flex-direction: column;
            gap: 16px;
            /* 与监控总览 .dashboard 一致，次要文字更易读 */
            --color-text-secondary: #A8B2BE;
        }
        .map-page-title {
            margin-bottom: 0;
        }
        .map-page-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--color-text-secondary);
        }
        .map-connection-pill {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.08);
            font-size: 13px;
        }
        .map-connection-pill.is-simulation,
        .map-connection-pill.is-connected {
            color: var(--color-success);
            background: rgba(82,196,26,0.12);
            border-color: rgba(82,196,26,0.24);
        }
        .map-connection-pill.is-connecting,
        .map-connection-pill.is-reconnecting,
        .map-connection-pill.is-polling {
            color: var(--color-orange);
            background: rgba(250,140,22,0.12);
            border-color: rgba(250,140,22,0.24);
        }
        .map-connection-pill.is-disconnected {
            color: var(--color-error);
            background: rgba(245,34,45,0.12);
            border-color: rgba(245,34,45,0.24);
        }
        .map-scene-shell {
            position: relative;
            height: calc(100vh - var(--nav-height) - 140px);
            min-height: 620px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }
        .map-viewport {
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        .map-viewport canvas {
            display: block;
            background: transparent;
        }
        .map-viewport:active {
            cursor: grabbing;
        }
        .map-toolbar,
        .map-legend,
        .map-tooltip,
        .map-toast {
            position: absolute;
            z-index: 3;
        }
        .map-toolbar {
            left: 20px;
            bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
        }
        .map-action-btn {
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: var(--color-text);
            border-radius: var(--radius-md);
            padding: 10px 14px;
            cursor: pointer;
            transition: background var(--transition-fast), border-color var(--transition-fast), transform var(--transition-fast);
        }
        .map-action-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.14);
            transform: translateY(-1px);
        }
        .map-action-btn.primary {
            background: rgba(74,144,217,0.18);
            border-color: rgba(74,144,217,0.28);
            color: var(--color-ice-white);
        }
        .map-legend {
            right: 20px;
            top: 20px;
            width: 260px;
            padding: 16px;
        }
        .map-legend-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--color-text);
        }
        .map-legend-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .map-legend-item {
            display: grid;
            grid-template-columns: 10px 1fr auto;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--color-text-secondary);
        }
        .map-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,255,255,0.08);
        }
        .map-legend-count {
            color: var(--color-text);
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }
        .map-legend-hint {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 13px;
            line-height: 1.5;
            color: var(--color-text-secondary);
        }
        .map-tooltip {
            min-width: 220px;
            max-width: 240px;
            padding: 14px;
            pointer-events: none;
        }
        .map-tooltip-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }
        .map-tooltip-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text);
        }
        .map-tooltip-subtitle {
            margin-top: 4px;
            font-size: 12px;
            color: var(--color-text-secondary);
        }
        .map-status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 8px;
            min-width: 56px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            font-size: 12px;
            white-space: nowrap;
        }
        .map-tooltip-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
        }
        .map-tooltip-row strong {
            color: var(--color-text);
            font-weight: 500;
            text-align: right;
        }
        .map-battery-track {
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 999px;
            overflow: hidden;
        }
        .map-battery-fill {
            height: 100%;
            border-radius: inherit;
        }
        .map-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(6,10,16,0.48);
            z-index: 4;
        }
        .map-overlay-card {
            width: min(360px, calc(100% - 40px));
            padding: 24px;
            border-radius: 16px;
            background: rgba(15,20,35,0.88);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 16px 40px rgba(0,0,0,0.35);
            text-align: center;
        }
        .map-overlay-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--color-text);
        }
        .map-overlay-text {
            margin: 10px 0 18px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--color-text-secondary);
        }
        .map-toast {
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            padding: 12px 16px;
            font-size: 14px;
            color: var(--color-text);
            z-index: 5;
            white-space: nowrap;
        }
        @media (max-width: 1023px) {
            .map-page-meta {
                flex-wrap: wrap;
                justify-content: flex-end;
            }
            .map-scene-shell {
                height: calc(100vh - var(--nav-height) - 132px);
                min-height: 540px;
            }
            .map-legend {
                width: 220px;
            }
        }
        @media (max-width: 767px) {
            .map-page-title {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .map-page-meta {
                justify-content: flex-start;
            }
            .map-toolbar {
                left: 12px;
                right: 12px;
                bottom: 12px;
                justify-content: stretch;
            }
            .map-action-btn {
                flex: 1;
            }
            .map-legend {
                right: 12px;
                top: 12px;
                width: calc(100% - 24px);
            }
            .map-tooltip {
                max-width: calc(100% - 24px);
            }
        }

        /* ── AGV Detail ── */
        .agv-detail-page {
            display: flex;
            flex-direction: column;
            gap: 16px;
            --color-text-secondary: #A8B2BE;
        }
        .agv-page-title {
            margin-bottom: 0;
        }
        .agv-page-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 14px;
            color: var(--color-text-secondary);
        }
        .agv-meta-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: var(--color-text);
        }
        .agv-detail-layout {
            position: relative;
            display: grid;
            grid-template-columns: minmax(520px, 1.2fr) minmax(380px, 0.92fr);
            gap: 16px;
            align-items: stretch;
        }
        .agv-model-panel,
        .agv-info-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 16px 48px rgba(0,0,0,0.28);
        }
        .agv-model-panel {
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 700px;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            box-shadow: none;
        }
        .agv-model-panel.glass-card:hover:has(.agv-model-shell:hover) {
            background: transparent !important;
        }
        .agv-panel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            padding: 0 6px;
        }
        .agv-panel-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text);
        }
        .agv-panel-subtitle {
            margin-top: 4px;
            font-size: 13px;
            color: var(--color-text-secondary);
        }
        .agv-model-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }
        .agv-model-actions .map-action-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }
        .agv-model-shell {
            position: relative;
            flex: 1;
            min-height: 560px;
            overflow: visible;
            border-radius: 0;
            border: none;
            background: transparent;
            box-shadow: none;
        }
        .agv-model-viewport {
            width: 100%;
            height: 100%;
        }
        .agv-model-viewport canvas {
            display: block;
            background: transparent !important;
        }
        .agv-scene-note,
        .agv-hover-tag {
            position: absolute;
            z-index: 3;
        }
        .agv-scene-note {
            top: 16px;
            left: 16px;
            padding: 10px 14px;
            max-width: 320px;
            font-size: 13px;
            line-height: 1.5;
        }
        .agv-hover-tag {
            padding: 8px 12px;
            border-radius: 999px;
            white-space: nowrap;
            pointer-events: none;
            font-size: 13px;
            color: var(--color-text);
        }
        .agv-component-legend {
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
            width: fit-content;
            max-width: 100%;
            margin-left: auto;
            margin-bottom: 16px;
        }
        .agv-legend-title {
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-right: 4px;
        }
        .agv-legend-chip {
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: var(--color-text-secondary);
            padding: 8px 12px;
            border-radius: 999px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .agv-legend-chip:hover,
        .agv-legend-chip.active {
            color: var(--color-text);
            border-color: rgba(74,144,217,0.36);
            background: rgba(74,144,217,0.16);
            box-shadow: 0 0 20px rgba(74,144,217,0.15);
        }
        .agv-info-panel {
            position: relative;
            min-height: 560px;
            overflow: visible;
        }
        .agv-info-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }
        .agv-info-card {
            padding: 18px;
        }
        .agv-stat-list {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .agv-stat-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .agv-stat-row:last-child {
            padding-bottom: 0;
            border-bottom: none;
        }
        .agv-stat-label,
        .agv-kv-label {
            font-size: 14px;
            color: var(--color-text-secondary);
        }
        .agv-stat-value,
        .agv-kv-value {
            color: var(--color-text);
            font-weight: 600;
        }
        .agv-status-grid {
            margin-top: 18px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px 16px;
        }
        .agv-kv-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 58px;
        }
        .agv-kv-value {
            font-size: 18px;
            line-height: 1.2;
        }
        .agv-floating-card {
            position: absolute;
            width: 280px;
            min-height: 200px;
            padding: 0;
            z-index: 8;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 18px 38px rgba(0,0,0,0.35), 0 0 24px rgba(74,144,217,0.12);
        }
        .agv-floating-card.dragging {
            box-shadow: 0 24px 52px rgba(74,144,217,0.18), 0 0 26px rgba(74,144,217,0.2);
        }
        .agv-floating-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px 12px;
            cursor: move;
            user-select: none;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
        }
        .agv-floating-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--color-text);
        }
        .agv-floating-hint {
            margin-top: 4px;
            font-size: 12px;
            color: var(--color-text-secondary);
        }
        .agv-floating-close {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            color: var(--color-text);
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }
        .agv-floating-close:hover {
            background: rgba(255,255,255,0.12);
        }
        .agv-floating-body {
            padding: 14px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .agv-floating-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .agv-floating-label {
            font-size: 12px;
            letter-spacing: 0.2px;
            color: var(--color-text-secondary);
            text-transform: uppercase;
        }
        .agv-floating-section strong {
            font-size: 14px;
            color: var(--color-text);
        }
        .agv-floating-pairs {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .agv-floating-pair,
        .agv-floating-status-row,
        .agv-floating-health {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 13px;
            color: var(--color-text-secondary);
        }
        .agv-floating-pair strong,
        .agv-floating-status-row strong,
        .agv-floating-health strong {
            color: #7bb6ff;
        }
        .agv-floating-health span {
            color: var(--color-text-secondary);
        }
        .agv-state-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px currentColor;
        }
        .agv-state-dot.is-normal {
            color: #52c41a;
            background: #52c41a;
        }
        .agv-state-dot.is-warning {
            color: #faad14;
            background: #faad14;
        }
        .agv-state-dot.is-error {
            color: #f5222d;
            background: #f5222d;
        }
        @media (max-width: 1439px) {
            .agv-detail-layout {
                grid-template-columns: 1fr;
            }
            .agv-model-panel,
            .agv-info-panel {
                min-height: auto;
            }
        }
        @media (max-width: 1023px) {
            .agv-info-grid {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 767px) {
            .agv-page-title {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .agv-model-panel,
            .agv-info-card {
                padding: 14px;
            }
            .agv-model-shell {
                min-height: 400px;
            }
            .agv-component-legend {
                max-width: 100%;
                margin-left: 0;
            }
            .agv-panel-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* ── Task Management ── */
        .task-page,
        .task-create-page {
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
        }
        .task-toolbar,
        .task-segment,
        .task-filters,
        .task-table-card,
        .task-gantt-placeholder,
        .task-create-shell {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }
        .task-toolbar {
            position: sticky;
            top: 16px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 20px;
            border-radius: var(--radius-lg);
        }
        .task-toolbar-actions,
        .task-filter-actions,
        .task-submit-actions,
        .task-modal-actions,
        .task-sort-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .task-btn,
        .task-page-btn,
        .task-segment-btn,
        .task-mini-btn,
        .task-sort-btn {
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: var(--color-text);
            border-radius: var(--radius-md);
            padding: 10px 14px;
            font-size: 14px;
            cursor: pointer;
            transition: background var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
        }
        .task-btn:hover,
        .task-page-btn:hover,
        .task-segment-btn:hover,
        .task-mini-btn:hover,
        .task-sort-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.12);
            transform: translateY(-1px);
        }
        .task-btn:disabled,
        .task-page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .task-btn-primary {
            background: rgba(74,144,217,0.22);
            color: var(--color-ice-white);
            border-color: rgba(74,144,217,0.34);
        }
        .task-link-btn,
        .task-text-btn,
        .task-id-btn {
            border: none;
            background: transparent;
            color: var(--color-primary);
            cursor: pointer;
            font-size: 14px;
            padding: 0;
        }
        .task-link-btn:hover,
        .task-text-btn:hover,
        .task-id-btn:hover {
            text-decoration: underline;
        }
        .task-text-btn.warning { color: var(--color-warning); }
        .task-text-btn.info { color: #7bb6ff; }
        .task-text-btn.danger { color: #ff7c86; }
        .task-text-btn:disabled {
            color: var(--color-text-secondary);
            opacity: 0.45;
            cursor: not-allowed;
            text-decoration: none;
        }
        .task-more {
            position: relative;
        }
        .task-more-menu {
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            min-width: 180px;
            padding: 8px;
            border-radius: 12px;
            z-index: 25;
        }
        .task-menu-item {
            width: 100%;
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            text-align: left;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            font-size: 14px;
        }
        .task-menu-item.is-disabled {
            cursor: not-allowed;
        }
        .task-segment {
            display: inline-flex;
            width: fit-content;
            padding: 6px;
            border-radius: 999px;
        }
        .task-segment-btn {
            border: none;
            background: transparent;
            border-radius: 999px;
            min-width: 120px;
        }
        .task-segment-btn.active {
            background: rgba(74,144,217,0.16);
            color: var(--color-primary);
        }
        .task-filters {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 20px;
            border-radius: var(--radius-lg);
        }
        .task-filter-grid,
        .task-create-grid,
        .task-detail-grid {
            display: grid;
            gap: 16px;
        }
        .task-filter-grid {
            flex: 1;
            grid-template-columns: repeat(5, minmax(0, 1fr));
        }
        .task-create-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .task-detail-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .task-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }
        .task-search-field {
            grid-column: span 2;
        }
        .task-field-full,
        .task-detail-item.is-full {
            grid-column: 1 / -1;
        }
        .task-field-label {
            font-size: 14px;
            color: var(--color-text-secondary);
        }
        .task-field-label em {
            font-style: normal;
            color: #ff6a75;
        }
        .task-input,
        .task-textarea {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: var(--color-text);
            border-radius: var(--radius-md);
            padding: 11px 12px;
            font-size: 14px;
            outline: none;
            transition: border-color var(--transition-fast), background var(--transition-fast);
        }
        .task-input:focus,
        .task-textarea:focus {
            border-color: rgba(74,144,217,0.5);
            background: rgba(255,255,255,0.06);
        }
        .task-input option {
            background: #162031;
            color: var(--color-text);
        }
        .task-input-with-action {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }
        .task-mini-btn {
            padding-inline: 12px;
        }
        .task-table-card,
        .task-create-shell,
        .task-gantt-placeholder {
            border-radius: var(--radius-lg);
            padding: 20px;
        }
        .task-table-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }
        .task-table-title,
        .task-drawer-title,
        .task-modal-title,
        .task-gantt-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text);
        }
        .task-sort-btn {
            padding: 8px 12px;
        }
        .task-sort-btn.active {
            border-color: rgba(74,144,217,0.3);
            color: var(--color-primary);
            background: rgba(74,144,217,0.12);
        }
        .task-table-wrap {
            overflow: auto;
        }
        .task-table {
            width: 100%;
            min-width: 1120px;
            border-collapse: collapse;
        }
        .task-table thead th {
            text-align: left;
            padding: 12px 14px;
            color: var(--color-text-secondary);
            font-size: 13px;
            font-weight: 500;
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .task-table tbody td {
            padding: 14px;
            font-size: 14px;
            color: var(--color-text);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            vertical-align: middle;
        }
        .task-table tbody tr {
            position: relative;
        }
        .task-table tbody tr:hover {
            background: rgba(74,144,217,0.06);
        }
        .task-table tbody tr.urgent::before,
        .task-table tbody tr.rework::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            bottom: 6px;
            width: 3px;
            border-radius: 3px;
        }
        .task-table tbody tr.urgent::before {
            background: #fa8c16;
        }
        .task-table tbody tr.rework::before {
            background: #4A90D9;
        }
        .task-tag,
        .task-status-badge,
        .task-priority-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            border: 1px solid transparent;
            min-height: 28px;
            padding: 4px 10px;
            font-size: 13px;
        }
        .task-type-tag {
            background: rgba(74,144,217,0.08);
            color: var(--color-primary);
        }
        .task-status-badge {
            border-color: currentColor;
        }
        .task-priority-chip {
            min-width: 36px;
            border: none;
            cursor: pointer;
            transition: transform var(--transition-fast), filter var(--transition-fast);
        }
        .task-priority-chip:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
        }
        .task-priority-chip.is-low {
            background: rgba(140,140,140,0.18);
            color: #c5cad3;
        }
        .task-priority-chip.is-normal {
            background: rgba(74,144,217,0.18);
            color: #8fc5ff;
        }
        .task-priority-chip.is-high {
            background: rgba(250,140,22,0.18);
            color: #ffb36d;
        }
        .task-agv-cell {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .task-inline-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--color-text-secondary);
            font-size: 12px;
        }
        .task-inline-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .task-row-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .task-empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 300px;
            color: var(--color-text-secondary);
            text-align: center;
        }
        .task-empty-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(74,144,217,0.08);
            color: var(--color-primary);
            font-weight: 700;
            letter-spacing: 1px;
        }
        .task-empty-title {
            font-size: 18px;
            color: var(--color-text);
        }
        .task-pagination {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 16px;
        }
        .task-page-indicator,
        .task-help-text,
        .task-counter,
        .task-modal-text {
            font-size: 13px;
            color: var(--color-text-secondary);
        }
        .task-overlay {
            position: fixed;
            inset: 0;
            z-index: 1200;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            justify-content: flex-end;
            padding: 24px;
        }
        .task-drawer {
            width: min(420px, 100%);
            border-radius: 16px;
            padding: 18px;
            overflow: auto;
        }
        .task-detail-drawer {
            width: min(520px, 100%);
        }
        .task-drawer-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }
        .task-drawer-close {
            border: none;
            background: rgba(255,255,255,0.06);
            color: var(--color-text);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
        .task-agv-list {
            display: grid;
            gap: 12px;
        }
        .task-agv-card,
        .task-detail-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 14px;
        }
        .task-agv-card-header,
        .task-agv-card-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .task-agv-card-row + .task-agv-card-row {
            margin-top: 10px;
        }
        .task-agv-battery {
            height: 8px;
            border-radius: 999px;
            background: rgba(255,255,255,0.06);
            overflow: hidden;
            margin-top: 12px;
        }
        .task-agv-battery-fill {
            height: 100%;
            border-radius: inherit;
        }
        .task-detail-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .task-detail-item span {
            font-size: 13px;
            color: var(--color-text-secondary);
        }
        .task-detail-item strong {
            font-size: 15px;
            color: var(--color-text);
        }
        .task-modal {
            width: min(420px, 100%);
            margin: auto;
            border-radius: 16px;
            padding: 20px;
        }
        .task-preview-modal {
            width: min(560px, 100%);
        }
        .task-priority-preview {
            display: flex;
            justify-content: center;
            margin: 18px 0 6px;
        }
        .task-range {
            width: 100%;
            accent-color: var(--color-primary);
            margin-top: 16px;
        }
        .task-create-shell {
            max-width: 760px;
            width: 100%;
            align-self: center;
        }
        .task-textarea {
            resize: vertical;
            min-height: 120px;
        }
        .task-textarea-footer,
        .task-priority-editor {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .task-counter.limit {
            color: var(--color-warning);
        }
        .task-submit-actions {
            justify-content: center;
            margin-top: 24px;
        }
        .task-error {
            font-size: 12px;
            color: #ff7c86;
        }
        .task-map-preview {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin-top: 16px;
        }
        .task-map-node {
            padding: 14px 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            text-align: center;
            font-size: 13px;
            color: var(--color-text-secondary);

            backdrop-filter: var(--glass-blur);

        }
        .mi-actions--full { grid-column: 1 / -1; }
        .mi-row {

            justify-content: space-between;

            margin-bottom: 10px;

        .mi-actions--fail { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 12px; }
        .mi-btn {

            padding: 4px 10px;

            font-size: 12px;
            cursor: pointer;

        }

        /* ── 事件日志 (.ev-*) — 事件日志部分ui.md ── */
        .ev-page {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: calc(100vh - var(--nav-height) - 48px);
            width: 100%;
            --ev-info: #1890ff;
            --ev-warn: #faad14;
            --ev-error: #f5222d;
            --ev-debug: #bfbfbf;
        }
        .ev-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 18px;
        }
        .ev-toolbar-left, .ev-toolbar-right {
            display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
        }
        .ev-search {
            min-width: 200px;
            flex: 1;
            max-width: 360px;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: var(--color-text);
            font-size: 14px;
        }
        .ev-chip {
            border: 1px solid rgba(255,255,255,0.08);
            background: transparent;
            color: var(--color-text-secondary);
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            cursor: pointer;
        }
        .ev-chip:hover { background: rgba(255,255,255,0.06); }
        .ev-chip.active { border-color: rgba(24,144,255,0.4); color: var(--ev-info); background: rgba(24,144,255,0.1); }
        .ev-chip.ev-chip--warn.active { border-color: rgba(250,173,20,0.45); color: var(--ev-warn); background: rgba(250,173,20,0.12); }
        .ev-chip.ev-chip--err.active { border-color: rgba(245,34,45,0.45); color: var(--ev-error); background: rgba(245,34,45,0.12); }
        .ev-advanced {
            padding: 0 18px 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .ev-advanced-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px 16px;
            margin-top: 12px;
        }
        @media (max-width: 1200px) {
            .ev-advanced-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {
            .ev-advanced-grid { grid-template-columns: 1fr; }
        }
        .ev-field label { display: block; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; }
        .ev-field select {
            width: 100%; padding: 8px 10px; border-radius: var(--radius-md);
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05); color: var(--color-text); font-size: 13px;
        }
        .ev-list-wrap {
            flex: 1;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .ev-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            padding: 8px 0;
        }
        .ev-item {
            display: grid;
            grid-template-columns: 72px 56px 1fr;
            gap: 10px;
            padding: 10px 16px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            cursor: pointer;
            transition: background var(--transition-fast);
            align-items: start;
        }
        .ev-item:hover { background: rgba(255,255,255,0.04); }
        .ev-item.is-new { animation: evFlash 0.6s ease; }
        .ev-item.is-error-flash { animation: evErrFlash 1.2s ease; }
        .ev-item.is-warn-flash { animation: evWarnFlash 0.5s ease; }
        @keyframes evFlash {
            0%, 100% { background: transparent; }
            40% { background: rgba(24,144,217,0.12); }
        }
        @keyframes evErrFlash {
            0%, 100% { box-shadow: inset 0 0 0 0 transparent; }
            15% { box-shadow: inset 0 0 0 2px rgba(245,34,45,0.7); }
            30% { box-shadow: inset 0 0 0 0 transparent; }
            45% { box-shadow: inset 0 0 0 2px rgba(245,34,45,0.5); }
        }
        @keyframes evWarnFlash {
            0%, 100% { box-shadow: inset 0 0 0 0 transparent; }
            50% { box-shadow: inset 0 0 0 2px rgba(250,173,20,0.6); }
        }
        .ev-item-time { color: var(--color-text-secondary); font-variant-numeric: tabular-nums; font-size: 13px; }
        .ev-item-level {
            font-size: 12px; font-weight: 600; padding: 2px 6px; border-radius: 4px; text-align: center;
        }
        .ev-item-level.l-info { color: var(--ev-info); background: rgba(24,144,255,0.12); }
        .ev-item-level.l-warn { color: var(--ev-warn); background: rgba(250,173,20,0.12); }
        .ev-item-level.l-error { color: var(--ev-error); background: rgba(245,34,45,0.12); }
        .ev-item-level.l-debug { color: var(--ev-debug); background: rgba(191,191,191,0.1); }
        .ev-item-msg { color: var(--color-text); line-height: 1.45; word-break: break-word; }
        .ev-item-msg mark { background: rgba(250,173,20,0.35); color: inherit; padding: 0 2px; border-radius: 2px; }
        .ev-footer {
            display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
            gap: 10px; padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 13px; color: var(--color-text-secondary);
        }
        .ev-footer-btns { display: flex; flex-wrap: wrap; gap: 8px; }
        .ev-modal-wide { width: min(560px, 100%); max-height: 85vh; overflow: auto; }
        .ev-detail-section h4 { font-size: 13px; color: var(--color-text-secondary); margin: 14px 0 8px; }
        .ev-detail-section p, .ev-detail-section li { font-size: 14px; line-height: 1.55; color: var(--color-text); }
        .ev-detail-kv { list-style: none; }
        .ev-detail-kv li { display: flex; justify-content: space-between; gap: 12px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ev-detail-kv span { color: var(--color-text-secondary); }
        .ev-settings-grid { display: grid; gap: 12px; margin-top: 12px; }
        .ev-settings-grid input { padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: var(--color-text); }
    </style>
</head>
